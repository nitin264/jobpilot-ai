services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env
    environment:
      JOBPILOT_APP_NAME: JobPilot AI
      JOBPILOT_ENVIRONMENT: local
      JOBPILOT_LOG_LEVEL: INFO
      JOBPILOT_DATABASE_HOST: postgres
      JOBPILOT_DATABASE_PORT: "5432"
      JOBPILOT_DATABASE_NAME: jobpilot
      JOBPILOT_DATABASE_USER: jobpilot
      JOBPILOT_DATABASE_PASSWORD: jobpilot
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: jobpilot
      POSTGRES_USER: jobpilot
      POSTGRES_PASSWORD: jobpilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobpilot -d jobpilot"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  postgres_data:
